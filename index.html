<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Cric Earn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.adsgram.ai/js/sdk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Keep all your existing CSS styles here (the ones with --gold, --bg, etc.) */
        /* I am omitting the 800 lines of CSS for brevity, but make sure you keep your styling! */
        :root {--gold: #F4C252; --bg: #080B10; --text: #F0F4FF; --accent: #00C6FF; --font-head: 'Syne', sans-serif;}
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; }
        .shell { width: 100%; max-width: 480px; min-height: 100vh; margin: 0 auto; display: flex; flex-direction: column; }
        .page { display: none; padding: 20px; padding-bottom: 100px; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hero-balance { font-family: var(--font-head); font-size: 56px; text-align: center; margin: 20px 0; }
        .btn-watch { width: 100%; padding: 20px; border-radius: 20px; border: none; background: linear-gradient(90deg, #0072FF, #00C6FF); color: white; font-weight: 800; font-size: 18px; cursor: pointer; box-shadow: 0 8px 25px rgba(0,114,255,0.3); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; display: flex; background: rgba(8,11,16,0.9); backdrop-filter: blur(10px); padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { flex: 1; background: none; border: none; color: #7B8799; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--accent); }
    </style>
</head>
<body>

<div class="shell">
    <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05);">
        <div style="font-family: var(--font-head); font-weight: 800;">ELITE <span style="color:var(--gold)">CRIC</span></div>
        <div id="userDisplayName" style="font-size: 12px; color: var(--gold);">Guest User</div>
    </div>

    <div class="pages">
        <div id="page-home" class="page active">
            <div class="hero-balance" id="heroBalance">0.00</div>
            <div style="text-align: center; color: var(--accent); font-weight: 700; margin-bottom: 30px;">⭐ STARS</div>
            <button class="btn-watch" onclick="showAd()">📺 WATCH AD & EARN</button>
            
            <div style="margin-top: 30px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>Daily Progress</span>
                    <span id="adProgressText">0/10</span>
                </div>
                <div style="width: 100%; height: 8px; background: #222; border-radius: 10px; overflow: hidden;">
                    <div id="adProgressBar" style="width: 0%; height: 100%; background: var(--accent);"></div>
                </div>
            </div>
        </div>

        <div id="page-refer" class="page">
            <h2 style="font-family: var(--font-head);">Invite Friends 🚀</h2>
            <p style="color: #7B8799;">Earn 10% from every ad your friend watches.</p>
            <div style="background: #141A24; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px dashed var(--accent);">
                <code id="refLinkDisplay" style="color: var(--accent); word-break: break-all;">Loading link...</code>
            </div>
            <button class="btn-watch" onclick="copyRefLink()" style="background: var(--gold); color: black;">🔗 COPY INVITE LINK</button>
        </div>

        <div id="page-wallet" class="page">
            <h2 style="font-family: var(--font-head);">Your Wallet 👛</h2>
            <div style="background: #141A24; padding: 30px; border-radius: 20px; text-align: center; margin-top: 20px;">
                <div style="font-size: 14px; color: #7B8799;">WITHDRAWABLE</div>
                <div style="font-size: 32px; font-weight: 800; margin: 10px 0;" id="walletBalance">0.00 ⭐</div>
                <button onclick="alert('Min withdrawal 50 Stars')" style="background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; border-radius: 10px;">Withdraw Now</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="showPage('home', this)">🏠<br>HOME</button>
        <button class="nav-btn" onclick="showPage('refer', this)">🚀<br>REFER</button>
        <button class="nav-btn" onclick="showPage('wallet', this)">👛<br>WALLET</button>
    </nav>
</div>

<script>
    // ── INITIALIZE TELEGRAM ──
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    let userId = tg.initDataUnsafe?.user?.id || "guest";
    let userName = tg.initDataUnsafe?.user?.first_name || "User";
    document.getElementById('userDisplayName').innerText = userName;
    document.getElementById('refLinkDisplay').innerText = `https://t.me/EliteCric_Fantasy_Bot?start=${userId}`;

    // ── STATE ──
    let balance = 0;
    let adsToday = 0;

    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function showAd() {
        // REPLACE 'YOUR_BLOCK_ID' with your real ID from AdsGram
        const AdController = window.Adsgram.init({ blockId: "YOUR_BLOCK_ID" });
        
        AdController.show().then((result) => {
            // SUCCESSFUL AD WATCH
            balance += 0.06;
            adsToday++;
            updateUI();
            tg.HapticFeedback.notificationOccurred('success');
        }).catch((result) => {
            alert("Ad missed! Please watch until the end.");
        });
    }

    function updateUI() {
        document.getElementById('heroBalance').innerText = balance.toFixed(2);
        document.getElementById('walletBalance').innerText = balance.toFixed(2) + " ⭐";
        document.getElementById('adProgressText').innerText = `${adsToday}/10`;
        document.getElementById('adProgressBar').style.width = `${(adsToday/10)*100}%`;
    }

    function copyRefLink() {
        const link = document.getElementById('refLinkDisplay').innerText;
        navigator.clipboard.writeText(link).then(() => {
            tg.showPopup({ message: "Link Copied! Share it with your friends." });
        });
    }
</script>
</body>
</html>
