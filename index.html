<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Fantasy Earn</title>
    <script src="https://static.adsgram.ai/js/sdk.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #334155; }
        .balance-title { color: #94a3b8; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-size: 36px; font-weight: bold; color: #38bdf8; margin: 10px 0; }
        .btn { background: #38bdf8; color: #0f172a; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .stats { display: flex; justify-content: space-around; margin-top: 20px; }
        .stat-item { background: #334155; padding: 10px; border-radius: 10px; width: 45%; }
        .premium-box { margin-top: 20px; padding: 15px; border: 1px dashed #fbbf24; border-radius: 15px; color: #fbbf24; }
    </style>
</head>
<body>

    <div class="card">
        <p class="balance-title">Your Earnings (60% Share)</p>
        <div class="balance-value" id="userBalance">0.00 Stars</div>
        <button class="btn" onclick="showRealAd()">Watch Ad to Earn</button>
    </div>

    <div class="stats">
        <div class="stat-item">
            <small>Ads Watched</small><br>
            <b id="adCount">0</b>
        </div>
        <div class="stat-item">
            <small>My Profit (40%)</small><br>
            <b id="adminProfit">$0.00</b>
        </div>
    </div>

    <div class="premium-box">
        <b>🚀 Gold Member Upgrade</b><br>
        <small>Get 80% Share + Unlimited Ads</small><br>
        <button onclick="alert('Subscription coming soon!')" style="background:none; border: 1px solid #fbbf24; color:#fbbf24; margin-top:10px; padding:5px 10px; border-radius:5px;">Upgrade for 50 Stars</button>
    </div>

    <script>
        let adsWatched = 0;
        let balance = 0;
        let adminCommission = 0;

        function showRealAd() {
            // Replace 'YOUR_ZONE_ID' with the actual ID from AdsGram.ai
            const AdController = window.Adsgram.init({ blockId: "YOUR_ZONE_ID" });
            
            AdController.show().then((result) => {
                // User finished the ad
                adsWatched++;
                balance += 0.06; // 60% of 0.10
                adminCommission += 0.04; // 40% of 0.10
                
                updateUI();
            }).catch((result) => {
                alert("Ad skipped or failed. No reward.");
            });
        }

        function updateUI() {
            document.getElementById('userBalance').innerText = balance.toFixed(2) + " Stars";
            document.getElementById('adCount').innerText = adsWatched;
            document.getElementById('adminProfit').innerText = "$" + adminCommission.toFixed(2);
        }
    </script>
</body>
</html>
