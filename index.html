<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Cric Earn | Global</title>
    <script src="https://static.adsgram.ai/js/sdk.js"></script>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0b0e14;
            --card-bg: rgba(25, 30, 40, 0.95);
        }

        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; display: flex; justify-content: center;
        }

        /* Responsive Wrapper: Centers content on Laptop, Full width on Mobile */
        .app-container {
            width: 100%;
            max-width: 500px; /* Limits width on Laptop */
            min-height: 100vh;
            background: var(--bg);
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .header { padding: 25px; text-align: center; font-weight: 900; font-size: 24px; color: var(--primary); text-shadow: 0 0 15px rgba(0,242,254,0.3); }

        .page { display: none; padding: 20px; animation: slideUp 0.4s ease; flex: 1; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--card-bg); padding: 30px; border-radius: 30px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px; transition: 0.3s;
        }

        .balance-value { 
            font-size: 50px; font-weight: 900; margin: 10px 0;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn-watch { 
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: #000; border: none; padding: 22px; border-radius: 20px;
            font-weight: 900; font-size: 18px; width: 100%; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,242,254,0.2); transition: 0.3s;
        }
        .btn-watch:active { transform: scale(0.96); }

        /* Navigation Bar - Responsive */
        .bottom-nav { 
            position: sticky; bottom: 0; width: 100%; background: #161b22; 
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid #30363d;
        }
        .nav-item { background: none; border: none; color: #8b949e; text-align: center; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 24px; display: block; margin-bottom: 4px; }

        progress { width: 100%; height: 10px; border-radius: 10px; accent-color: var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">ELITE CRIC 🏏</div>

    <div id="home" class="page active">
        <div class="card">
            <span style="letter-spacing: 2px; font-size: 12px; color: #8b949e;">TOTAL BALANCE</span>
            <div class="balance-value" id="userBalance">0.00</div>
            <div style="font-weight: bold; color: var(--primary);">STARS</div>
            <button class="btn-watch" style="margin-top:20px;" onclick="runAd()">📺 WATCH & EARN</button>
        </div>

        <div class="card" style="background: rgba(255,255,255,0.02);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>Daily Task</span>
                <span id="taskStat">0/10</span>
            </div>
            <progress id="pBar" value="0" max="10"></progress>
        </div>
    </div>

    <div id="refer" class="page">
        <div class="card">
            <h2>👥 Team Earnings</h2>
            <p>Get 10% commission when your friends watch ads!</p>
            <div style="background: #000; padding: 15px; border-radius: 10px; font-family: monospace; margin: 20px 0;" id="refLink">
                t.me/EliteCricBot?start=59283
            </div>
            <button class="btn-watch" onclick="copyRef()">🔗 COPY LINK</button>
        </div>
    </div>

    <div id="wallet" class="page">
        <div class="card">
            <h2>👛 Wallet Info</h2>
            <div style="text-align: left; margin: 20px 0;">
                <p>Withdrawal Limit: <b>50 Stars</b></p>
                <p>Pending: <b>0.00</b></p>
            </div>
            <button class="btn-watch" style="background: #30363d; color: #fff;">Withdraw History</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="showPage('home')"><span class="nav-icon">💎</span>Home</button>
        <button class="nav-item" onclick="showPage('refer')"><span class="nav-icon">🚀</span>Refer</button>
        <button class="nav-item" onclick="showPage('wallet')"><span class="nav-icon">👛</span>Wallet</button>
    </nav>
</div>

<script>
    let balance = 0;
    let adsToday = 0;

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function runAd() {
        // Replace 'YOUR_ZONE_ID' with real ID
        const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "YOUR_ZONE_ID" }) : null;
        if(AdController) {
            AdController.show().then(() => updateBalance());
        } else {
            updateBalance(); // Mock for testing
        }
    }

    function updateBalance() {
        balance += 0.06;
        adsToday++;
        document.getElementById('userBalance').innerText = balance.toFixed(2);
        document.getElementById('pBar').value = adsToday;
        document.getElementById('taskStat').innerText = adsToday + "/10";
    }

    function copyRef() {
        navigator.clipboard.writeText(document.getElementById('refLink').innerText);
        alert("Link copied! 🔗");
    }
</script>

</body>
</html>
