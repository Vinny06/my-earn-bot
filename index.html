<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Cric Earn</title>
    <script src="https://static.adsgram.ai/js/sdk.js"></script>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #f093fb;
            --bg: #0b0e14;
            --card-bg: rgba(25, 30, 40, 0.9);
        }

        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .header { padding: 20px; text-align: center; font-weight: 800; font-size: 22px; color: var(--primary); text-shadow: 0 0 15px rgba(0,242,254,0.4); }

        /* Page System */
        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease-in-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard Cards */
        .card { 
            background: var(--card-bg); padding: 25px; border-radius: 25px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px;
        }

        .balance-value { 
            font-size: 45px; font-weight: 900; margin: 10px 0;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Buttons */
        .btn-watch { 
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: #000; border: none; padding: 20px; border-radius: 20px;
            font-weight: 900; font-size: 18px; width: 100%; cursor: pointer;
            box-shadow: 0 0 20px rgba(0,242,254,0.3); transition: 0.3s;
        }
        .btn-watch:active { transform: scale(0.95); }

        .btn-action { 
            flex: 1; background: #1a202c; border: 1px solid #2d3748; color: #a0aec0;
            padding: 12px; border-radius: 15px; cursor: pointer; font-size: 14px;
        }

        /* Nav Bar */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: #161b22; 
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid #30363d; z-index: 1000;
        }
        .nav-item { background: none; border: none; color: #8b949e; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }
        .nav-icon { font-size: 24px; display: block; }
    </style>
</head>
<body>

    <div class="header">ELITE CRIC EARN ⚡</div>

    <div id="home" class="page active">
        <div class="card">
            <span style="color: #8b949e; font-weight: bold;">💰 MY BALANCE</span>
            <div class="balance-value" id="userBalance">0.00</div>
            <div style="color: var(--primary); font-weight: bold; margin-bottom: 20px;">STARS</div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="btn-action" onclick="showPage('wallet')">📤 Withdraw</button>
                <button class="btn-action" onclick="showPage('wallet')">📩 Deposit</button>
            </div>
            
            <button class="btn-watch" onclick="runAd()">📺 WATCH AD & EARN</button>
        </div>

        <div class="card" style="background: linear-gradient(135deg, #1a202c, #0b0e14); border: 1px solid var(--accent);">
            <h3 style="color: var(--accent); margin: 0;">🎁 Daily Gift</h3>
            <p style="font-size: 13px; color: #8b949e;">Watch 10 ads to unlock bonus!</p>
            <progress id="pBar" value="0" max="10" style="width: 100%;"></progress>
        </div>
    </div>

    <div id="refer" class="page">
        <div class="card">
            <h2 style="color: var(--primary);">👥 TEAM WORK</h2>
            <p>Earn <b>10%</b> from every friend's ad watch!</p>
            <div class="card" style="background: #000; border: 1px dashed var(--primary);">
                <code id="refLink">t.me/EliteCricBot?start=123</code>
            </div>
            <button class="btn-watch" onclick="copyRef()">🔗 COPY LINK</button>
        </div>
    </div>

    <div id="wallet" class="page">
        <div class="card">
            <h2>👛 WALLET</h2>
            <p style="color: #8b949e;">Minimum Payout: 50 Stars</p>
            <div class="card" style="text-align: left;">
                <div style="display: flex; justify-content: space-between;">
                    <span>Total Earned</span>
                    <span style="color: var(--primary);">0.00 Stars</span>
                </div>
            </div>
            <button class="btn-watch" style="background: #30363d; color: white;">History 📜</button>
        </div>
    </div>

    <div id="profile" class="page">
        <div class="card">
            <div style="width: 80px; height: 80px; background: var(--primary); border-radius: 50%; margin: 0 auto 15px;"></div>
            <h3>USER_ID: 59283</h3>
            <p style="color: #8b949e;">Member Since: April 2026</p>
            <button class="btn-action" style="width: 100%; margin-top: 10px;">Support Chat 🎧</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="showPage('home')">
            <span class="nav-icon">💎</span>Home
        </button>
        <button class="nav-item" onclick="showPage('refer')">
            <span class="nav-icon">🚀</span>Refer
        </button>
        <button class="nav-item" onclick="showPage('wallet')">
            <span class="nav-icon">👛</span>Wallet
        </button>
        <button class="nav-item" onclick="showPage('profile')">
            <span class="nav-icon">👤</span>Profile
        </button>
    </nav>

    <script>
        let balance = 0;
        let adsToday = 0;

        function showPage(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Show new page
            document.getElementById(pageId).classList.add('active');
            // Update nav icons
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function runAd() {
            // Placeholder for real AdsGram logic
            const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "YOUR_ZONE_ID" }) : null;
            
            if(AdController) {
                AdController.show().then(() => {
                    updateBalance();
                });
            } else {
                // Mock earning for testing
                updateBalance();
            }
        }

        function updateBalance() {
            balance += 0.06;
            adsToday++;
            document.getElementById('userBalance').innerText = balance.toFixed(2);
            document.getElementById('pBar').value = adsToday;
        }

        function copyRef() {
            navigator.clipboard.writeText(document.getElementById('refLink').innerText);
            alert("Invite link copied to clipboard! 🔗");
        }
    </script>
</body>
</html>
