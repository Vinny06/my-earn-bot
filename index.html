<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Fantasy Earn</title>
    <script src="https://static.adsgram.ai/js/sdk.js"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #050b18;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body { 
            background: radial-gradient(circle at top, #1e293b 0%, #050b18 100%);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0; padding: 0; padding-bottom: 90px;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .header { 
            padding: 25px 20px; text-align: center; 
            font-size: 20px; font-weight: 800;
            letter-spacing: 1px; color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
            position: sticky; top: 0; background: var(--bg); z-index: 100;
        }

        .page { display: none; }
        .page.active { display: block; }
        .container { padding: 15px; }

        /* The Glow Card */
        .card { 
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 25px; border-radius: 24px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 0 20px rgba(58, 123, 213, 0.2);
            margin-bottom: 20px;
        }

        .balance-label { color: var(--text-dim); font-size: 12px; font-weight: 600; text-transform: uppercase; }
        
        .balance-value { 
            font-size: 42px; font-weight: 900; 
            background: linear-gradient(to right, #00d2ff, #92fe9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 15px 0;
            filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.3));
        }

        /* Neon Action Grid */
        .action-grid { display: flex; gap: 12px; margin-bottom: 20px; }
        .btn-secondary { 
            flex: 1; background: rgba(255,255,255,0.05); color: white; 
            border: 1px solid rgba(255,255,255,0.1); padding: 14px; 
            border-radius: 14px; font-weight: 600; cursor: pointer;
            transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-secondary:active { background: rgba(255,255,255,0.1); }

        .btn-main { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: #fff; border: none; padding: 20px; 
            border-radius: 16px; font-weight: 800; font-size: 18px; 
            width: 100%; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
            text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* Referral Box */
        .referral-box { 
            background: linear-gradient(rgba(0,210,255,0.05), rgba(0,0,0,0));
            padding: 20px; border-radius: 20px; border: 1px solid rgba(0, 210, 255, 0.2);
        }

        /* Bottom Nav Glassmorphism */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        .nav-item { color: #64748b; text-decoration: none; font-size: 11px; text-align: center; background: none; border: none; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 5px; }

    </style>
</head>
<body>

    <div class="header">ELITE CRIC EARN</div>

    <div id="home" class="page active container">
        <div class="card">
            <div class="balance-label">Available Balance</div>
            <div class="balance-value" id="userBalance">0.00 Stars</div>
            <div class="action-grid">
                <button class="btn-secondary" onclick="alert('Min withdrawal: 50 Stars')"><span>📤</span> Withdrawal</button>
                <button class="btn-secondary" onclick="alert('Deposit via Stars')"><span>📩</span> Deposit</button>
            </div>
            <button class="btn-main" onclick="showRealAd()"><span>👀</span> Watch Ad & Earn</button>
        </div>

        <div class="referral-box">
            <h4 style="margin: 0 0 10px 0; color: var(--primary);">💎 Referral Program</h4>
            <p style="font-size: 13px; color: var(--text-dim); margin-bottom: 15px;">Earn 10% lifetime commission from friends!</p>
            <button onclick="copyRef()" style="width:100%; background:rgba(0, 210, 255, 0.1); border:1px solid var(--primary); color:var(--primary); padding:12px; border-radius:12px; font-weight:700;"><span>🔗</span> Invite Friends</button>
        </div>
    </div>

    <div id="refer" class="page container">
        <h2>👥 Refer a Friend</h2>
        <div class="card">
            <h3>Your Referrals</h3>
            <p style="font-size: 24px;">0 friends</p>
        </div>
    </div>

    <div id="wallet" class="page container">
        <h2>👛 Your Wallet</h2>
        <div class="card">
            <p class="balance-label">Current Balance</p>
            <div class="balance-value">0.00 Stars</div>
            <button class="btn-main" onclick="alert('Transfer details soon')">Withdraw</button>
        </div>
    </div>

    <div id="profile" class="page container">
        <h2>⚙️ Profile Settings</h2>
        <div class="card">
            <p>Username: User123</p>
            <p>Status: Free Member</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="showPage('home')">
            <span class="nav-icon">💎</span>Home
        </button>
        <button class="nav-item" onclick="showPage('refer')">
            <span class="nav-icon">🚀</span>Refer
        </button>
        <button class="nav-item" onclick="showPage('wallet')">
            <span class="nav-icon">👛</span>Wallet
        </button>
        <button class="nav-item" onclick="showPage('profile')">
            <span class="nav-icon">👤</span>Profile
        </button>
    </nav>

    <script>
        let balance = 0;

        function showRealAd() {
            const AdController = window.Adsgram.init({ blockId: "YOUR_ZONE_ID" });
            AdController.show().then(() => {
                balance += 0.06;
                document.getElementById('userBalance').innerText = balance.toFixed(2) + " Stars";
            }).catch(() => { alert("Ad failed to load."); });
        }

        function copyRef() { alert("Link Copied!"); }

        function showPage(pageId) {
            // Hide all pages
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.classList.remove('active'));

            // Show selected page
            document.getElementById(pageId).classList.add('active');

            // Deactivate all nav items
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));

            // Activate current nav item
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
